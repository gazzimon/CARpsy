    de: Hochvoltsystem-Interlock-Kreis L hoch
  description:
    en: 'HVIL loop L voltage above expected range. A communication loss with this module breaks any function relying on its data — diagnostic tools may show ''no response'' and dependent modules can fall into limp mode.'
    de: 'Spannung am HVIL-Loop L über Sollbereich. Ein Kommunikationsausfall mit diesem Modul bricht jede Funktion, die seine Daten benötigt — Diagnosegeräte zeigen ''keine Antwort'' und abhängige Steuergeräte können in den Notlauf wechseln.'
  affected_components:
    - hvil_loop_l
    - hvil_wiring
  common_causes:
    - id: open_loop
      likelihood: high
      label:
        en: Interlock loop open
        de: Interlock-Loop offen
    - id: gateway_module_fault
      likelihood: low
      label:
        en: 'Gateway module routing CAN messages incorrectly'
        de: 'Gateway-Modul leitet CAN-Botschaften fehlerhaft'
    - id: terminator_resistor_drift
      likelihood: low
      label:
        en: 'CAN terminating resistor (120 Ω) drifted out of spec'
        de: 'CAN-Abschlusswiderstand (120 Ω) außerhalb der Spezifikation'
  symptoms:
    - en: 'Multiple warning lights may illuminate'
      de: 'Mehrere Warnleuchten können aufleuchten'
    - en: 'Affected modules may go into limp mode or shut down'
      de: 'Betroffene Steuergeräte können in Notlauf gehen oder abschalten'
    - en: 'Specific functions inoperative depending on module'
      de: 'Spezifische Funktionen je nach Modul außer Betrieb'
    - en: 'Diagnostic tools may show communication faults'
      de: 'Diagnosegeräte können Kommunikationsfehler anzeigen'
  repair:
    difficulty: hard
    diy_possible: false
    estimated_cost_eur: [100, 1500]
    estimated_hours: [1, 5]
