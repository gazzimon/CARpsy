        de: ABS-Pumpenmotor defekt (Bürstenverschleiß, festgefressen)
    - id: abs_relay_failed
      likelihood: medium
      label:
        en: ABS pump relay failed
        de: ABS-Pumpenrelais defekt
    - id: abs_power_wiring
      likelihood: low
      label:
        en: Power supply wiring or fuse fault
        de: Versorgungsleitungs- oder Sicherungsfehler
  symptoms:
    - en: 'ABS warning light on'
      de: 'ABS-Warnleuchte an'
    - en: 'ESC/stability control deactivated'
      de: 'ESP/Stabilitätskontrolle deaktiviert'
    - en: 'Possible reduced brake assist'
      de: 'Möglicherweise reduzierte Bremskraftunterstützung'
    - en: 'Speedometer may behave erratically'
      de: 'Tachometer kann sich auffällig verhalten'
