        de: Bus-Verkabelung unterbrochen oder kurzgeschlossen
    - id: module_unpowered
      likelihood: medium
      label:
        en: Module without power or ground
        de: Modul ohne Spannung oder Masse
    - id: module_failed
      likelihood: medium
      label:
        en: Module failed
        de: Modul defekt
