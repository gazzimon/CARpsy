    - en: 'Specific functions inoperative depending on module'
      de: 'Spezifische Funktionen je nach Modul außer Betrieb'
    - en: 'Diagnostic tools may show communication faults'
      de: 'Diagnosegeräte können Kommunikationsfehler anzeigen'
  repair:
    difficulty: medium
