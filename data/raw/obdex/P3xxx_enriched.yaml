    - cylinder_deactivation_solenoid
    - engine_wiring_harness
    - ecm
  common_causes:
    - id: solenoid_coil_open
      likelihood: high
      label:
        en: Solenoid coil open
        de: Magnetventilspule unterbrochen
    - id: wiring_open
      likelihood: medium
      label:
        en: Wiring or connector open
        de: Verkabelung oder Stecker unterbrochen
    - id: connector_back_out
      likelihood: low
      label:
        en: 'Pin pushed back out of connector body'
        de: 'Pin aus dem Steckergehäuse zurückgedrückt'
  repair:
    difficulty: hard
    diy_possible: false
    estimated_cost_eur: [150, 1200]
    estimated_hours: [1.0, 6.0]
  flags:
    mil: true
    emissions_relevant: true
    drive_cycle_required: true
  references:
