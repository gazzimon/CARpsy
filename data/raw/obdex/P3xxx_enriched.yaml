        de: Signalleitung mit Masseschluss
    - id: connector_corrosion
      likelihood: low
      label:
        en: 'Connector pins corroded - high contact resistance'
        de: 'Steckerkontakte korrodiert - hoher Übergangswiderstand'
    - id: harness_chafe
      likelihood: low
      label:
        en: 'Harness chafing through insulation'
        de: 'Kabelbaum scheuert sich durch die Isolation'
  symptoms:
    - en: 'Check engine light on'
      de: 'Motorkontrollleuchte an'
    - en: 'Power loss especially in mid-rpm range'
      de: 'Leistungsverlust besonders im mittleren Drehzahlbereich'
    - en: 'Possible rough idle or stalling'
      de: 'Möglicherweise unrunder Leerlauf oder Absterben'
    - en: 'Increased fuel consumption'
