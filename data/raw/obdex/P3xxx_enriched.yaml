    de: A-Nockenwellenversteller Temperatursensor Schaltkreis niedrig Bank 1
  description:
    en: 'Cam actuator A temperature sensor on bank 1 signal voltage below expected range — short to ground. The camshaft position sensor identifies which cylinder is on the compression stroke — without it the ECM cannot run sequential injection or coil-on-plug ignition correctly.'
    de: 'Signalspannung Cam-Aktuator-A-Temperatursensor Bank 1 unter Sollbereich — Masseschluss. Der Nockenwellen-Positionssensor erkennt, welcher Zylinder sich im Verdichtungstakt befindet — ohne ihn kann das Steuergerät weder sequentielle Einspritzung noch Coil-on-Plug-Zündung sauber steuern.'
  affected_components:
    - cam_actuator_a_temp_sensor_b1
    - sensor_wiring
  common_causes:
    - id: short_to_ground
