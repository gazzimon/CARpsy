# CARpsy — QVAC Fabric LoRA Training Configuration
# Recommended model: Qwen3-1.7B-Q4_K_M
# Repo: https://github.com/tetherto/qvac-fabric-llm.cpp

model:
  # Recommended for QVAC hackathon — natively tested architecture
  base: "models/qwen3-1.7b-q4_k_m.gguf"
  # Fallback: LLaMA 3.2 1B (also supported but not QVAC-native)
  # base: "models/llama-3.2-1b-instruct-q4_k_m.gguf"

dataset:
  path:            "data/splits/train.jsonl"
  validation_path: "data/splits/val.jsonl"
  format:          "chat"   # system / user / assistant messages
  max_examples:    10000    # cap for initial training run

lora:
  rank:   8     # --lora-rank  (8–16 recommended)
  alpha:  16    # --lora-alpha (typically 2× rank)
  dropout: 0.05
  target_modules:
    - "attn_q"
    - "attn_k"
    - "attn_v"
    - "attn_o"

training:
  context_length:       512    # -c  (mobile-optimised)
  batch_size:           4      # -b
  ubatch_size:          512    # -ub
  learning_rate:        2.0e-4 # --learning-rate
  weight_decay:         1.0e-2 # --weight-decay
  num_epochs:           3      # --epochs
  gpu_layers:           999    # -ngl (999 = all layers on GPU)
  assistant_loss_only:  true   # --assistant-loss-only (SFT only on assistant tokens)
  flash_attention:      false
  checkpoint_steps:     100    # --checkpoint-save-steps
  warmup_steps:         0
  lr_scheduler:         "cosine"  # constant | cosine | linear
